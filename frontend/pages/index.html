<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MedQ — Sistem Antrian RS</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.hero {
  background: linear-gradient(155deg, var(--blue-800) 0%, var(--blue-500) 100%);
  padding: clamp(44px, 10vw, 64px) var(--side-pad) clamp(64px, 14vw, 88px);
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute;
  width: clamp(200px, 60vw, 320px); height: clamp(200px, 60vw, 320px);
  border-radius: 50%; background: rgba(255,255,255,0.06);
  top: -80px; right: -60px;
}
.hero::after {
  content: ''; position: absolute;
  width: 140px; height: 140px; border-radius: 50%;
  background: rgba(255,255,255,0.04); bottom: 20px; left: -30px;
}
.logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: clamp(32px, 8vw, 48px); position: relative; z-index: 1; }
.logo-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.18); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { width: 20px; height: 20px; }
.logo-text { font-family: 'DM Serif Display', serif; font-size: clamp(18px, 4.5vw, 22px); color: white; }
.hero-tag { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; position: relative; z-index: 1; }
.hero-title { font-family: 'DM Serif Display', serif; font-size: clamp(26px, 7vw, 36px); color: white; line-height: 1.2; position: relative; z-index: 1; }

.content { flex: 1; padding: 0 var(--side-pad) 32px; margin-top: -28px; position: relative; z-index: 2; }
.sec-label { font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--gray-400); margin: 28px 0 14px; }

.nav-card {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--radius); padding: clamp(16px, 4vw, 20px);
  display: flex; align-items: center; gap: 16px;
  cursor: pointer; text-decoration: none; color: inherit;
  margin-bottom: 12px; transition: all 0.18s ease;
  box-shadow: var(--shadow-sm);
}
.nav-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.12); border-color: var(--blue-100); }
.nav-card:active { transform: scale(0.98); }
.nav-card.fade-up:nth-child(2) { animation-delay: 0.08s; }

.card-icon { width: clamp(44px, 12vw, 52px); height: clamp(44px, 12vw, 52px); border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.card-icon.blue  { background: var(--blue-50); }
.card-icon.green { background: #F0FDF4; }
.card-icon svg { width: clamp(22px, 6vw, 26px); height: clamp(22px, 6vw, 26px); }

.card-body { flex: 1; }
.card-title { font-size: clamp(14px, 3.5vw, 15px); font-weight: 600; color: var(--gray-900); margin-bottom: 3px; }
.card-desc  { font-size: clamp(12px, 3vw, 13px); color: var(--gray-500); line-height: 1.4; }

.card-arrow { width: 32px; height: 32px; border-radius: 50%; background: var(--gray-100); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.18s; }
.nav-card:hover .card-arrow { background: var(--blue-600); }
.nav-card:hover .card-arrow svg { stroke: white; }
.card-arrow svg { width: 16px; height: 16px; stroke: var(--gray-400); stroke-width: 2.5; fill: none; }
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/>
          <path d="M12 8v8M8 12h8"/>
        </svg>
      </div>
      <span class="logo-text">MedQ</span>
    </div>
    <p class="hero-tag">Sistem Antrian Digital</p>
    <h1 class="hero-title">Selamat Datang,<br>Pilih Layanan</h1>
  </div>

  <div class="content">
    <p class="sec-label">Jenis Kunjungan</p>

    <a href="pendaftaran.html" class="nav-card fade-up">
      <div class="card-icon blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="1.8">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </div>
      <div class="card-body">
        <p class="card-title">Pasien Baru</p>
        <p class="card-desc">Belum pernah berobat di sini, daftar sekarang</p>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>

    <a href="verifikasi.html" class="nav-card fade-up">
      <div class="card-icon green">
        <svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="1.8">
          <rect x="2" y="5" width="20" height="14" rx="3"/>
          <path d="M2 10h20M7 15h2M11 15h6"/>
        </svg>
      </div>
      <div class="card-body">
        <p class="card-title">Sudah Punya Nomor RM</p>
        <p class="card-desc">Input atau scan kartu berobat kamu</p>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>

    <div class="info-strip" style="margin-top: 8px;">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <p>Nomor antrian hanya berlaku untuk hari ini. Harap hadir sesuai jadwal di tiket.</p>
    </div>
  </div>
</div>
</body>
</html>
